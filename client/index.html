			rel="stylesheet"
		/>
		<script>
			// Apply theme before first paint to avoid a flash of the wrong colors.
			(function () {
				try {
					var t = JSON.parse(localStorage.getItem("rp_theme") || '"system"');
					var dark =
						t === "dark" ||
						(t !== "light" &&
							window.matchMedia("(prefers-color-scheme: dark)").matches);
					var root = document.documentElement;
					root.style.colorScheme = dark ? "dark" : "light";
					root.setAttribute("data-theme", dark ? "dark" : "light");
					root.style.setProperty("--bg", dark ? "#0a0c11" : "#f4f6f9");
					root.style.setProperty("--text", dark ? "#eceef4" : "#11151f");
					root.style.background = dark ? "#0a0c11" : "#f4f6f9";
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
