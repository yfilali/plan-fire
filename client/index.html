<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Firly · Retirement Planner</title>
		<link
			rel="icon"
			type="image/svg+xml"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%23f59e0b'/><path d='M12 2.5C12 6.5 16 8 16 12.6A4 4 0 1 1 8 12.6C8 10.3 9.4 9.6 10 8.3C10.9 9.8 10.6 6 12 2.5Z' fill='white'/></svg>"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply theme before first paint to avoid a flash of the wrong colors.
			(function () {
				try {
					var t = JSON.parse(localStorage.getItem("rp_theme") || '"system"');
					var dark =
						t === "dark" ||
						(t !== "light" &&
							window.matchMedia("(prefers-color-scheme: dark)").matches);
					var root = document.documentElement;
					root.style.colorScheme = dark ? "dark" : "light";
					root.setAttribute("data-theme", dark ? "dark" : "light");
					root.style.setProperty("--bg", dark ? "#0e1015" : "#f5f6f8");
					root.style.setProperty("--text", dark ? "#e7e8ee" : "#1a1d27");
					root.style.background = dark ? "#0e1015" : "#f5f6f8";
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
