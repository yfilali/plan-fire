<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="sans-serif">
  <defs>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="22%" r="55%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="86%" cy="88%" r="55%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0c11"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- logo tile + flame -->
  <g transform="translate(96,150)">
    <rect width="96" height="96" rx="24" fill="#1b1613"/>
    <g transform="translate(24,20) scale(2)">
      <path d="M12 2.5C12 6.5 16 8 16 12.6A4 4 0 1 1 8 12.6C8 10.3 9.4 9.6 10 8.3C10.9 9.8 10.6 6 12 2.5Z" fill="url(#fire)"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="216" y="228" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">Plan</tspan><tspan fill="url(#fire)">FIRE</tspan>
  </text>

  <!-- headline -->
  <text x="96" y="380" font-size="64" font-weight="800" fill="#eceef4" letter-spacing="-1.5">Know the exact day</text>
  <text x="96" y="456" font-size="64" font-weight="800" fill="#eceef4" letter-spacing="-1.5">you can retire.</text>

  <!-- subline -->
  <text x="98" y="536" font-size="30" font-weight="500" fill="#969db0">Free &amp; open-source FIRE retirement planner &#183; planfire.dev</text>
</svg>
